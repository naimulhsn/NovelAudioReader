<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Text to Speech Player</title>
    <meta name="description"
        content="A premium text-to-speech player with chunk-based audio playback, voice selection, and speed control.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">

        <!-- Main Text Area / Reader -->
        <div class="text-area-wrapper" id="textAreaWrapper">
            <textarea id="novelText" placeholder="Paste your text here to convert to speech..."
                spellcheck="false"></textarea>

            <div id="readerView" class="reader-view hidden custom-scrollbar">
                <!-- Chunk spans injected here -->
            </div>

            <!-- Floating text action buttons (visible only when textarea is shown) -->
            <div id="textActions" class="text-actions">
                <button id="pasteBtn" class="text-action-btn" title="Paste from clipboard">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                    </svg>
                    <span>Paste</span>
                </button>
                <button id="clearBtn" class="text-action-btn" title="Clear text">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                    <span>Clear</span>
                </button>
            </div>
        </div>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <h2>Settings</h2>
                <div class="modal-section">
                    <button id="modalCloseBtn" class="close-btn" title="Close">✕</button>
                </div>
                <div class="modal-section">
                    <label>Auto-Scroll:</label>
                    <button id="modalScrollToggle" class="select-control">ON</button>
                </div>
                <div class="modal-section">
                    <label for="modalSpeedSelect">Speed:</label>
                    <select id="modalSpeedSelect" class="select-control">
                        <option value="0.8">0.8x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.2">1.2x</option>
                        <option value="1.3">1.3x</option>
                        <option value="1.4">1.4x</option>
                        <option value="1.5">1.5x</option>
                        <option value="1.6">1.6x</option>
                        <option value="1.7">1.7x</option>
                        <option value="1.8">1.8x</option>
                        <option value="1.9">1.9x</option>
                        <option value="2">2.0x</option>
                    </select>
                </div>
                <div class="modal-section">
                    <label for="modalVoiceSelect">Voice:</label>
                    <select id="modalVoiceSelect" class="select-control select-voice"></select>
                </div>
                <div class="modal-section">
                    <label for="textSizeRange">Text Size:</label>
                    <input type="range" id="textSizeRange" min="0.8" max="2" step="0.05" value="1"
                        class="select-control" />
                </div>
                <div class="modal-section">
                    <label for="textColorPicker">Text Color:</label>
                    <input type="color" id="textColorPicker" value="#e2e8f0" class="select-control" />
                </div>
                <div class="modal-section">
                    <label for="textOpacityRange">Text Opacity:</label>
                    <input type="range" id="textOpacityRange" min="0.3" max="1" step="0.05" value="1"
                        class="select-control" />
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-bar" id="controlsBar">

            <!-- Row 1: Playback -->
            <div class="controls-row controls-main">
                <!-- Left: skip back -->
                <button id="skipBackBtn" class="ctrl-btn ctrl-skip" title="Previous chunk (←)">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                    </svg>
                </button>

                <!-- Center: play -->
                <button id="playBtn" class="ctrl-btn ctrl-play" title="Play / Pause (Space)">
                    <svg id="playIcon" class="icon-lg" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="pauseIcon" class="icon-lg hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                    <svg id="loadingIcon" class="icon-lg hidden animate-spin" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </button>

                <!-- Right: skip forward -->
                <button id="skipForwardBtn" class="ctrl-btn ctrl-skip" title="Next chunk (→)">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                    </svg>
                </button>

                <!-- Stop -->
                <button id="stopBtn" class="ctrl-btn ctrl-stop" title="Stop (Escape)">
                    <svg class="icon" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 6h12v12H6z" />
                    </svg>
                </button>
                <button id="settingsBtn" class="ctrl-btn ctrl-settings" title="Settings">
                    <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path opacity="0.5" fill-rule="evenodd" clip-rule="evenodd"
                            d="M14.2788 2.15224C13.9085 2 13.439 2 12.5 2C11.561 2 11.0915 2 10.7212 2.15224C10.2274 2.35523 9.83509 2.74458 9.63056 3.23463C9.53719 3.45834 9.50065 3.7185 9.48635 4.09799C9.46534 4.65568 9.17716 5.17189 8.69017 5.45093C8.20318 5.72996 7.60864 5.71954 7.11149 5.45876C6.77318 5.2813 6.52789 5.18262 6.28599 5.15102C5.75609 5.08178 5.22018 5.22429 4.79616 5.5472C4.47814 5.78938 4.24339 6.1929 3.7739 6.99993C3.30441 7.80697 3.06967 8.21048 3.01735 8.60491C2.94758 9.1308 3.09118 9.66266 3.41655 10.0835C3.56506 10.2756 3.77377 10.437 4.0977 10.639C4.57391 10.936 4.88032 11.4419 4.88029 12C4.88026 12.5581 4.57386 13.0639 4.0977 13.3608C3.77372 13.5629 3.56497 13.7244 3.41645 13.9165C3.09108 14.3373 2.94749 14.8691 3.01725 15.395C3.06957 15.7894 3.30432 16.193 3.7738 17C4.24329 17.807 4.47804 18.2106 4.79606 18.4527C5.22008 18.7756 5.75599 18.9181 6.28589 18.8489C6.52778 18.8173 6.77305 18.7186 7.11133 18.5412C7.60852 18.2804 8.2031 18.27 8.69012 18.549C9.17714 18.8281 9.46533 19.3443 9.48635 19.9021C9.50065 20.2815 9.53719 20.5417 9.63056 20.7654C9.83509 21.2554 10.2274 21.6448 10.7212 21.8478C11.0915 22 11.561 22 12.5 22C13.439 22 13.9085 22 14.2788 21.8478C14.7726 21.6448 15.1649 21.2554 15.3694 20.7654C15.4628 20.5417 15.4994 20.2815 15.5137 19.902C15.5347 19.3443 15.8228 18.8281 16.3098 18.549C16.7968 18.2699 17.3914 18.2804 17.8886 18.5412C18.2269 18.7186 18.4721 18.8172 18.714 18.8488C19.2439 18.9181 19.7798 18.7756 20.2038 18.4527C20.5219 18.2105 20.7566 17.807 21.2261 16.9999C21.6956 16.1929 21.9303 15.7894 21.9827 15.395C22.0524 14.8691 21.9088 14.3372 21.5835 13.9164C21.4349 13.7243 21.2262 13.5628 20.9022 13.3608C20.4261 13.0639 20.1197 12.558 20.1197 11.9999C20.1197 11.4418 20.4261 10.9361 20.9022 10.6392C21.2263 10.4371 21.435 10.2757 21.5836 10.0835C21.9089 9.66273 22.0525 9.13087 21.9828 8.60497C21.9304 8.21055 21.6957 7.80703 21.2262 7C20.7567 6.19297 20.522 5.78945 20.2039 5.54727C19.7799 5.22436 19.244 5.08185 18.7141 5.15109C18.4722 5.18269 18.2269 5.28136 17.8887 5.4588C17.3915 5.71959 16.7969 5.73002 16.3099 5.45096C15.8229 5.17191 15.5347 4.65566 15.5136 4.09794C15.4993 3.71848 15.4628 3.45833 15.3694 3.23463C15.1649 2.74458 14.7726 2.35523 14.2788 2.15224Z"
                            fill="#aaaaaa" />
                        <path
                            d="M15.5227 12C15.5227 13.6569 14.1694 15 12.4999 15C10.8304 15 9.47705 13.6569 9.47705 12C9.47705 10.3431 10.8304 9 12.4999 9C14.1694 9 15.5227 10.3431 15.5227 12Z"
                            fill="#1C274C" />
                    </svg>
                </button>
            </div>

            <!-- Row 2: Progress + Settings -->
            <div class="controls-row controls-settings">
                <div id="progressInfo" class="progress-info">
                    <span id="progressText">Ready</span>
                </div>

                <div class="settings-group">
                    <button id="autoScrollToggle" class="select-control" style="width: auto; padding: 4px 10px;"
                        title="Toggle Auto-Scroll">
                        Scroll: ON
                    </button>
                    <select id="speedSelect" class="select-control" title="Playback speed">
                        <option value="0.8">0.8x</option>
                        <option value="0.9">0.9x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.2">1.2x</option>
                        <option value="1.3">1.3x</option>
                        <option value="1.4">1.4x</option>
                        <option value="1.5">1.5x</option>
                        <option value="1.6">1.6x</option>
                        <option value="1.7">1.7x</option>
                        <option value="1.8">1.8x</option>
                        <option value="1.9">1.9x</option>
                        <option value="2">2.0x</option>
                    </select>

                    <select id="voiceSelect" class="select-control select-voice" title="Voice">
                        <!-- Voices populated by JS -->
                    </select>
                </div>
            </div>

            <!-- Progress bar -->
            <div class="progress-bar-track" id="progressBarTrack">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
